<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>群文件自动清理 - 管理面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.header{background:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.08);position:sticky;top:0;z-index:10}
.header h1{font-size:18px;font-weight:600}
.header .status{font-size:13px;color:#888}
.container{max-width:1100px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:#fff;border-radius:8px;padding:4px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab{padding:10px 20px;border:none;background:none;cursor:pointer;border-radius:6px;font-size:14px;transition:.2s}
.tab.active{background:#1677ff;color:#fff}
.tab:hover:not(.active){background:#f0f2f5}
.card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.card h3{font-size:16px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0f0f0}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
select,input[type=text],input[type=number]{padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none;transition:.2s}
select:focus,input:focus{border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.1)}
select{min-width:200px}
input[type=text]{min-width:160px}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:14px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#1677ff;color:#fff}
.btn-primary:hover{background:#4096ff}
.btn-danger{background:#ff4d4f;color:#fff}
.btn-danger:hover{background:#ff7875}
.btn-default{background:#f5f5f5;color:#333;border:1px solid #d9d9d9}
.btn-default:hover{border-color:#1677ff;color:#1677ff}
.btn:disabled{opacity:.5;cursor:not-allowed}
table{width:100%;border-collapse:collapse}
th{padding:12px;text-align:left;font-weight:500;font-size:13px;color:#888;border-bottom:1px solid #f0f0f0}
td{padding:12px;font-size:14px;border-bottom:1px solid #f5f5f5}
tr:hover{background:#fafafa}
.checkbox{width:18px;height:18px;cursor:pointer;accent-color:#1677ff}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px}
.tag-success{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.tag-danger{background:#fff2f0;color:#ff4d4f;border:1px solid #ffccc7}
.empty{text-align:center;padding:40px;color:#999;font-size:14px}
.loading{text-align:center;padding:40px;color:#999}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;padding:24px;max-width:500px;width:90%;max-height:70vh;overflow-y:auto}
.modal h2{font-size:18px;margin-bottom:16px}
.modal .file-list{max-height:300px;overflow-y:auto;margin:12px 0}
.modal .file-item{padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:14px}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.toast{position:fixed;top:24px;right:24px;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;z-index:200;animation:slideIn .3s}
.toast-success{background:#52c41a}
.toast-error{background:#ff4d4f}
.toast-info{background:#1677ff}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:14px;font-weight:500;margin-bottom:6px}
.form-group .hint{font-size:12px;color:#999;margin-top:4px}
.panel{display:none}
.panel.active{display:block}
.section-title{font-size:15px;font-weight:500;margin:16px 0 8px;color:#555}
@media(max-width:768px){
  .container{padding:12px}
  .header{padding:0 12px}
  .row{flex-direction:column;align-items:stretch}
  select{min-width:auto}
  table{font-size:12px}
  th,td{padding:8px}
}
</style>
</head>
<body>

<div class="header">
  <h1>群文件自动清理 · 管理面板</h1>
  <span class="status" id="status"></span>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" data-tab="files">群文件列表</button>
    <button class="tab" data-tab="history">清理历史</button>
    <button class="tab" data-tab="config">系统配置</button>
  </div>

  <!-- 群文件列表 -->
  <div class="panel active" id="panel-files">
    <div class="card">
      <div class="row">
        <select id="groupSelect"><option value="">-- 选择群聊 --</option></select>
        <input type="text" id="userIdInput" placeholder="你的QQ号 (权限验证)">
        <button class="btn btn-default" onclick="checkPermission()">验证权限</button>
        <span id="permStatus" style="font-size:13px"></span>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
        <h3 style="margin:0;padding:0;border:none">根目录文件</h3>
        <div style="display:flex;gap:8px">
          <button class="btn btn-default" onclick="loadFiles()" id="refreshBtn">刷新</button>
          <button class="btn btn-danger" onclick="confirmDelete()" id="deleteBtn" disabled>删除选中</button>
        </div>
      </div>
      <div id="filesContent" class="loading">请选择群聊并加载文件</div>
    </div>
  </div>

  <!-- 清理历史 -->
  <div class="panel" id="panel-history">
    <div class="card">
      <h3>清理历史记录</h3>
      <button class="btn btn-default" onclick="loadHistory()">刷新</button>
      <div id="historyContent" class="loading" style="margin-top:16px">加载中...</div>
    </div>
  </div>

  <!-- 系统配置 -->
  <div class="panel" id="panel-config">
    <div class="card">
      <h3>自动清理配置</h3>
      <div class="form-group">
        <label>执行日期（每月第几天）</label>
        <input type="number" id="cleanDay" min="1" max="28" value="1" style="width:100px">
        <div class="hint">范围 1-28，建议避开月末最后几天</div>
      </div>
      <div class="form-group">
        <label>执行时间</label>
        <input type="text" id="cleanTime" value="00:00" style="width:100px" placeholder="HH:MM">
        <div class="hint">格式: HH:MM，例如 03:00 表示凌晨3点</div>
      </div>
      <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
      <span id="configMsg" style="margin-left:12px;font-size:13px"></span>
    </div>
  </div>
</div>

<!-- 删除确认弹窗 -->
<div class="modal-overlay" id="confirmModal" style="display:none">
  <div class="modal">
    <h2>确认删除文件</h2>
    <p style="font-size:14px;color:#666">即将删除以下 <strong id="confirmCount">0</strong> 个文件：</p>
    <div class="file-list" id="confirmFileList"></div>
    <div class="actions">
      <button class="btn btn-default" onclick="closeModal()">取消</button>
      <button class="btn btn-danger" id="confirmDeleteBtn" onclick="executeDelete()">确认删除</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let state = { groups: [], currentGroup: null, files: [], selectedIds: new Set(), isAdmin: false };

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
loadGroups();
loadConfigForm();

async function api(url, opts = {}) {
  const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return res.json();
}

function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  setTimeout(() => t.className = '', 3000);
}

// ── 标签切换 ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
  if (name === 'history') loadHistory();
  if (name === 'config') loadConfigForm();
  if (name === 'files') loadGroups();
}

// ── 群列表 ──
async function loadGroups() {
  try {
    const groups = await api('/api/groups');
    state.groups = groups;
    const sel = document.getElementById('groupSelect');
    sel.innerHTML = '<option value="">-- 选择群聊 --</option>' + groups.map(g =>
      `<option value="${g.group_id}">${g.group_name} (${g.group_id})</option>`
    ).join('');
    document.getElementById('status').textContent = `已加载 ${groups.length} 个群`;
  } catch (e) {
    showToast('加载群列表失败', 'error');
  }
}

document.getElementById('groupSelect').addEventListener('change', e => {
  state.currentGroup = e.target.value;
  state.files = [];
  state.selectedIds.clear();
  state.isAdmin = false;
  document.getElementById('permStatus').textContent = '';
  document.getElementById('deleteBtn').disabled = true;
  if (state.currentGroup) loadFiles();
});

// ── 权限 ──
async function checkPermission() {
  const uid = document.getElementById('userIdInput').value.trim();
  if (!uid || !state.currentGroup) {
    showToast('请先选择群聊并输入QQ号', 'error');
    return;
  }
  try {
    const r = await api(`/api/permission/${state.currentGroup}/${uid}`);
    state.isAdmin = r.is_admin;
    const s = document.getElementById('permStatus');
    if (r.is_admin) {
      s.innerHTML = '<span class="tag tag-success">管理员 (已授权)</span>';
      document.getElementById('deleteBtn').disabled = false;
    } else {
      s.innerHTML = '<span class="tag tag-danger">无权限 (仅群主/管理员可操作)</span>';
      document.getElementById('deleteBtn').disabled = true;
    }
  } catch (e) {
    showToast('权限验证失败', 'error');
  }
}

// ── 文件列表 ──
async function loadFiles() {
  if (!state.currentGroup) return;
  document.getElementById('filesContent').innerHTML = '<div class="loading">加载中...</div>';
  try {
    const data = await api(`/api/files/${state.currentGroup}`);
    state.files = data.files || [];
    state.selectedIds.clear();
    renderFiles();
  } catch (e) {
    document.getElementById('filesContent').innerHTML = '<div class="empty">加载失败</div>';
  }
}

function formatSize(b) {
  if (!b || b <= 0) return '0 B';
  const u = ['B', 'KB', 'MB', 'GB'];
  let i = 0, s = b;
  while (s >= 1024 && i < u.length - 1) { s /= 1024; i++; }
  return i === 0 ? s + ' ' + u[i] : s.toFixed(1) + ' ' + u[i];
}

function renderFiles() {
  const c = document.getElementById('filesContent');
  if (!state.files.length) {
    c.innerHTML = '<div class="empty">该群根目录暂无文件</div>';
    return;
  }
  c.innerHTML = `<table>
    <thead><tr>
      <th style="width:36px"><input type="checkbox" class="checkbox" onchange="toggleAll(this)"></th>
      <th>文件名</th>
      <th>大小</th>
      <th>上传者</th>
      <th>上传时间</th>
    </tr></thead>
    <tbody>${state.files.map(f => {
      const ts = f.upload_time ? new Date(f.upload_time * 1000).toLocaleString('zh-CN') : '-';
      return `<tr>
        <td><input type="checkbox" class="checkbox file-cb" value="${f.file_id}" onchange="toggleFile(this)"></td>
        <td>${f.file_name}</td>
        <td>${formatSize(f.file_size)}</td>
        <td>${f.uploader || '-'}</td>
        <td>${ts}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

function toggleAll(cb) {
  document.querySelectorAll('.file-cb').forEach(c => { c.checked = cb.checked; toggleFile(c); });
}

function toggleFile(cb) {
  if (cb.checked) state.selectedIds.add(cb.value);
  else state.selectedIds.delete(cb.value);
}

// ── 删除 ──
function confirmDelete() {
  if (!state.isAdmin) { showToast('无操作权限', 'error'); return; }
  if (state.selectedIds.size === 0) { showToast('请先选择要删除的文件', 'info'); return; }
  const selected = state.files.filter(f => state.selectedIds.has(f.file_id));
  document.getElementById('confirmCount').textContent = selected.length;
  document.getElementById('confirmFileList').innerHTML = selected.map(f =>
    `<div class="file-item">${f.file_name} <span style="color:#999">${formatSize(f.file_size)}</span></div>`
  ).join('');
  document.getElementById('confirmModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('confirmModal').style.display = 'none';
}

async function executeDelete() {
  document.getElementById('confirmDeleteBtn').disabled = true;
  try {
    const selected = state.files.filter(f => state.selectedIds.has(f.file_id));
    const userId = document.getElementById('userIdInput').value.trim();
    const r = await api(`/api/delete/${state.currentGroup}`, {
      method: 'POST',
      body: JSON.stringify({
        file_ids: [...state.selectedIds],
        user_id: userId,
        file_names: selected.map(f => f.file_name),
      }),
    });
    if (r.deleted !== undefined) {
      showToast(`删除完成：成功 ${r.deleted}，失败 ${r.failed}`, 'success');
    } else {
      showToast('删除失败: ' + (r.error || '未知'), 'error');
    }
    closeModal();
    state.selectedIds.clear();
    loadFiles();
    loadHistory();
  } catch (e) {
    showToast('删除请求失败', 'error');
  }
  document.getElementById('confirmDeleteBtn').disabled = false;
}

// ── 历史 ──
async function loadHistory() {
  document.getElementById('historyContent').innerHTML = '<div class="loading">加载中...</div>';
  try {
    const records = await api('/api/history');
    if (!records.length) {
      document.getElementById('historyContent').innerHTML = '<div class="empty">暂无清理记录</div>';
      return;
    }
    document.getElementById('historyContent').innerHTML = `<table>
      <thead><tr><th>时间</th><th>群号</th><th>操作者</th><th>成功</th><th>失败</th><th>文件列表</th></tr></thead>
      <tbody>${records.map(r => `<tr>
        <td>${r.time}</td>
        <td>${r.group_id}</td>
        <td>${r.operator}</td>
        <td><span class="tag tag-success">${r.deleted_count}</span></td>
        <td>${r.failed_count > 0 ? `<span class="tag tag-danger">${r.failed_count}</span>` : '0'}</td>
        <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(r.files||[]).join(', ')}">${(r.files||[]).slice(0,3).join(', ')}${(r.files||[]).length > 3 ? ' ...' : ''}</td>
      </tr>`).join('')}</tbody></table>`;
  } catch (e) {
    document.getElementById('historyContent').innerHTML = '<div class="empty">加载失败</div>';
  }
}

// ── 配置 ──
async function loadConfigForm() {
  try {
    const cfg = await api('/api/config');
    document.getElementById('cleanDay').value = cfg.auto_clean_day || 1;
    document.getElementById('cleanTime').value = cfg.auto_clean_time || '00:00';
  } catch (e) { /* use defaults */ }
}

async function saveConfig() {
  const day = parseInt(document.getElementById('cleanDay').value);
  const time = document.getElementById('cleanTime').value.trim();

  if (isNaN(day) || day < 1 || day > 28) {
    showToast('日期范围: 1-28', 'error'); return;
  }
  if (!/^\d{2}:\d{2}$/.test(time)) {
    showToast('时间格式: HH:MM', 'error'); return;
  }
  const [h, m] = time.split(':').map(Number);
  if (h < 0 || h > 23 || m < 0 || m > 59) {
    showToast('时间范围: 00:00-23:59', 'error'); return;
  }

  try {
    await api('/api/config', {
      method: 'POST',
      body: JSON.stringify({ auto_clean_day: day, auto_clean_time: time }),
    });
    document.getElementById('configMsg').innerHTML = '<span class="tag tag-success">已保存</span>';
    showToast('配置已保存', 'success');
  } catch (e) {
    showToast('保存失败', 'error');
  }
}
</script>
</body>
</html>
